<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Certicode Labs</title>
<style>
body {
  font-family: Arial;
  background: #1e293b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  width: 350px;
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  background: linear-gradient(90deg, blue, purple);
  color: white;
  border: none;
  cursor: pointer;
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="container" id="authBox">
  <h2 id="title">Login</h2>

  <input type="text" id="name" placeholder="Name (Sign up only)" class="hidden"/>
  <input type="email" id="email" placeholder="Email"/>
  <input type="password" id="password" placeholder="Password"/>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <hr>
  <button onclick="biometricLogin()">Login with Biometric</button>

  <p onclick="toggle()">Switch Login/Signup</p>
</div>

<div class="container hidden" id="dashboard">
  <h2>Dashboard</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>
let isLogin = true;

function toggle() {
  isLogin = !isLogin;
  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.getElementById("name").classList.toggle("hidden");
}

async function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, email, password })
  });

  alert(await res.text());
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.success){
    showDashboard(data.user.name);
  } else {
    alert("Invalid login");
  }
}

function showDashboard(name){
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Welcome " + name;
}

function logout(){
  location.reload();
}

// 🔐 Simple biometric simulation using WebAuthn
async function biometricLogin() {
  try {
    await navigator.credentials.get({
      publicKey: {
        challenge: new Uint8Array(32),
        timeout: 60000,
        userVerification: "preferred"
      }
    });

    alert("Biometric success!");
    showDashboard("Biometric User");

  } catch (err) {
    alert("Biometric failed");
  }
}
</script>

</body>
</html>
