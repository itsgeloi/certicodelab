<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 350px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    color: white;
    text-align: center;
  }

  h2 {
    margin-bottom: 10px;
  }

  .tabs {
    display: flex;
    margin-bottom: 20px;
  }

  .tabs button {
    flex: 1;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #334155;
    color: white;
    border-radius: 8px;
  }

  .tabs button.active {
    background: linear-gradient(90deg, #06b6d4, #a855f7);
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #06b6d4, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }

  .divider {
    margin: 15px 0;
    font-size: 12px;
    opacity: 0.7;
  }

  .bio-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: transparent;
    color: white;
    cursor: pointer;
  }

  .checkbox {
    margin-top: 10px;
    font-size: 12px;
    text-align: left;
  }
</style>
</head>

<body>

<div class="container">
  <h2>CERTICODE LABS</h2>
  <p>Welcome back, developer</p>

  <div class="tabs">
    <button class="active">Login</button>
    <button>Sign Up</button>
  </div>

  <input type="email" placeholder="your@email.com">
  <input type="password" placeholder="Password">

  <button class="login-btn">Login</button>

  <div class="divider">OR</div>

  <button class="bio-btn">Login with Biometric</button>

  <div class="checkbox">
    <input type="checkbox"> I agree with terms
  </div>
</div>

</body>
</html>
